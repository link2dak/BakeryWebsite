{% extends "base.html" %}

{% block title %}Home Page{% endblock %}

{% block content %}
    <div class="pop-recipe-container center-container">
        <div class="pop-card-container recipe">
            <div class="pop-card-title recipe">
                <p>Popular Recipes</p>
            </div>
            <div class="pop-card-content recipe">
                {% for recipe in recipe_dict %}
                    <div class="individual-card recipe">
                        <div class="individuale-card-photo recipe">
                            <a href="{{ url_for('recipe', recipeID=recipe[0], recipeName=recipe[1]|lower|replace(' ', '-')) }}">
                                <img src="{{ url_for('static', filename='images/' ~ recipe[5]) }}">
                            </a>
                        </div>
                        <div class="individual-card-name-container">
                            <div class="individual-card-name recipe">
                                <div class="card-name-category">
                                    {{ recipe[6] }}
                                </div>
                                                            
                                <a class="card-name-url" data-url="{{ url_for('recipe', recipeID=recipe[0], recipeName=recipe[1]|lower|replace(' ', '-'))}}">
                                    {{ recipe[1] }}
                                </a>
                            </div>
                        </div>
    
                    </div>
                {% endfor %}
            </div>
        </div>    
    </div>
    <div class="pop-starter-container center-container">
        <div class="pop-card-container recipe">
            <div class="pop-card-title recipe">
                <p>Most Bought Starters</p>
            </div>
            <div class="pop-card-content recipe">
                {% for recipe in recipe_dict %}
                    <div class="individual-card recipe">
                        <div class="individuale-card-photo recipe">
                            <a href="{{ url_for('recipe', recipeID=recipe[0], recipeName=recipe[1]|lower|replace(' ', '-')) }}">
                                <img src="{{ url_for('static', filename='images/' ~ recipe[5]) }}">
                            </a>
                        </div>
                        <div class="individual-card-name-container">                        
                            <div class="individual-card-name">
                                <div class="card-name-category">
                                    {{ recipe[6] }}
                                </div>
                                <a class="card-name-url" data-url="{{ url_for('recipe', recipeID=recipe[0], recipeName=recipe[1]|lower|replace(' ', '-'))}}">
                                    {{ recipe[1] }}
                                </a>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>    
    </div>
    
{% endblock %}
