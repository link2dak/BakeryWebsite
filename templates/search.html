{% extends "base.html" %}

{% block title %}Home Page{% endblock %}

{% block content %}
    <div class="page-content search">
        <div class="search-title">
        <h1>Found {{matchedList | length}} results</h1>
    </div>
        <div class="card-container center-container">
            {% for recipe in matchedList %}
                <div class="individual-card">
                    <div class="individuale-card-photo recipe">
                        <a href="{{ url_for('recipe', recipeName=recipe.name)}}">
                            <img src="{{ url_for('static', filename='images/' ~ recipe.image) }}">
                        </a>
                    </div>
                    <div class="individual-card-name">
                        <a href="{{ url_for('recipe', recipeName=recipe.name)}}">
                            {{ recipe.name }}
                        </a>
                    </div>
                </div>
            {% endfor %}
        
        </div>

    </div>
    
{% endblock %}
